name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - 'release/**'

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run ci

  build:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install EAS CLI
        run: npm install -g eas-cli@16

      - name: Install dependencies
        run: npm ci

      - name: Build APK
        run: eas build --platform android --profile preview --local --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Rename APK for GitHub Release
        id: release_apk
        if: startsWith(github.ref, 'refs/heads/release/')
        shell: bash
        run: |
          set -euo pipefail
          BASE=$(node -p "require('./app.config.js').expo.extra.releaseApkBasename")
          VER=$(node -p "require('./package.json').version")
          shopt -s nullglob
          files=(./*.apk)
          if [ ${#files[@]} -eq 0 ]; then
            echo 'No APK found in repo root'
            exit 1
          fi
          SRC="${files[0]}"
          DEST="${BASE}-${VER}.apk"
          mv "$SRC" "$DEST"
          echo "filename=$DEST" >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/heads/release/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_apk.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.release_apk.outputs.filename }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Keep only the latest release
        if: startsWith(github.ref, 'refs/heads/release/')
        shell: bash
        run: |
          echo "Fetching releases..."
          gh release list --limit 100 --json tagName --jq '.[1:] | .[].tagName' | while read -r tag; do
            if [ -n "$tag" ]; then
              echo "Deleting older release: $tag"
              gh release delete "$tag" -y
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: ./*.apk
