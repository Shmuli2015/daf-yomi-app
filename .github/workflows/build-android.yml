name: Build Android APK
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: 🏗 Install EAS CLI
        run: npm install -g eas-cli

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Build APK
        run: eas build --platform android --profile preview --local --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📛 Rename APK for GitHub Release
        id: release_apk
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          BASE=$(node -p "require('./app.config.js').expo.extra.releaseApkBasename")
          VER=$(node -p "require('./package.json').version")
          shopt -s nullglob
          files=(./*.apk)
          if [ ${#files[@]} -eq 0 ]; then
            echo 'No APK found in repo root'
            exit 1
          fi
          SRC="${files[0]}"
          DEST="${BASE}-${VER}.apk"
          mv "$SRC" "$DEST"
          echo "filename=$DEST" >> "$GITHUB_OUTPUT"

      - name: 🚀 Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.release_apk.outputs.filename }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📂 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./*.apk
